{% extends 'navigationbar.html' %}
{% load static %}
{% block body %}

<div class="form-shell">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="section-title mb-0">Edit Patient</h2>
        <a href="{% url 'view_patient' %}" class="btn btn-soft">Back to Patients</a>
    </div>
    <div class="form-card">
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="row g-3">
                {% for field in form %}
                <div class="col-md-6 {% if field.name == 'allergies' or field.name == 'medical_notes' or field.name == 'address' %}col-12{% endif %}">
                    <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                    {% endif %}
                </div>
                {% endfor %}
            </div>
            <button type="submit" class="btn btn-brand mt-4">Update Patient</button>
        </form>
    </div>
</div>

{% endblock %}
