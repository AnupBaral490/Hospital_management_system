{% extends 'user_base.html' %}
{% load static %}
{% block body %}

<section class="page-hero mb-4">
    <h2 class="mb-2">User Registration</h2>
    <p class="mb-0">Create your account to use the patient dashboard and online booking.</p>
</section>

<div class="form-shell" style="max-width: 620px;">
    <div class="form-card">
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
            </div>

            <button type="submit" class="btn btn-brand w-100 mt-4">Create Account</button>
        </form>

        <p class="small text-muted mt-3 mb-0 text-center">Already registered? <a href="{% url 'user_login' %}">Login here</a></p>
    </div>
</div>

{% endblock %}
